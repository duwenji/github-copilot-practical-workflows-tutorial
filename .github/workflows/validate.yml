name: Validate tutorial repo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Build ebook
        run: |
          npm run ebook:step1
          npm run ebook:step2
          npm run ebook:step3
          npm run ebook:step2b
