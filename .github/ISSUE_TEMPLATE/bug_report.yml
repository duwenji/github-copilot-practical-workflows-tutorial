name: Bug report
description: 実務シナリオや教材内容の不具合を報告します
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きたかを簡潔に書いてください
      placeholder: 例) `upstream` の説明リンクが切れている
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: どのページで、どの操作をすると起きたか
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する結果
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境
      description: OS、VS Code、ブラウザなど
